name: 测试跨账号发布

on:
  workflow_dispatch:

jobs:
  test-release:
    runs-on: ubuntu-latest
    steps:
      # 1. 生成文本文件
      - name: 生成文本文件
        run: |
          echo "测试文件" > 测试.txt
          echo "这是测试内容" >> 测试.txt
          echo "触发时间: $(date)" >> 测试.txt

      # 2. 生成日志文件
      - name: 生成日志文件
        run: |
          echo "构建日志" > 测试.log
          echo "测试通过" >> 测试.log
          echo "运行ID: ${{ github.run_id }}" >> 测试.log

      # 3. 查看生成的文件
      - name: 查看文件
        run: |
          echo "=== 测试.txt ==="
          cat 测试.txt
          echo "=== 测试.log ==="
          cat 测试.log

      # 4. 跨账号发布
      - name: 创建版本并上传
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.WY_SECRET }}
          repository: "wy15828318331/2025part"
          tag_name: test-${{ github.run_id }}
          name: "测试发布 ${{ github.run_id }}"
          files: |
            测试.txt
            测试.log
