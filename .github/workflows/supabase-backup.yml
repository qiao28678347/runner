# ==============================================
# Supabase 全自动备份脚本（免费版专用）
# 已修复 pg_dump 版本不匹配问题 ✅ 支持 PostgreSQL 17
# 备份：数据库全量 + 数据 + 函数 + 触发器 + 视图 + 云函数
# ==============================================
name: Supabase 全量自动备份

# 触发条件：每天自动备份 + 手动点击备份
on:
  schedule:
    - cron: "0 20 * * *"  # UTC 20:00 = 北京时间 04:00
  workflow_dispatch:  # 允许手动触发（你要的手动点击备份）

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # ==============================================
      # 安装 PostgreSQL 17 客户端（修复版本不匹配）
      # ==============================================
      - name: 安装 PostgreSQL 17 客户端
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17

      # ==============================================
      # 生成时间戳
      # ==============================================
      - name: 生成时间戳
        id: time
        run: echo "timestamp=$(date +%Y-%m-%d_%H-%M-%S)" >> $GITHUB_OUTPUT

      # ==============================================
      # 数据库全量备份（结构+数据+函数+触发器+视图）
      # ==============================================
      - name: 备份 Supabase 数据库
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          pg_dump \
            --no-owner \
            --no-privileges \
            --blobs \
            --encoding=utf8 \
            --if-exists \
            --clean \
            "$DATABASE_URL" > supabase_db_full_${{ steps.time.outputs.timestamp }}.sql

      # ==============================================
      # 备份云函数 Edge Functions
      # ==============================================
      - name: 打包云函数
        run: |
          if [ -d "./functions" ]; then
            zip -r supabase_functions_${{ steps.time.outputs.timestamp }}.zip ./functions
          else
            touch supabase_functions_${{ steps.time.outputs.timestamp }}.zip
          fi

      # ==============================================
      # 上传备份文件（可下载）
      # ==============================================
      - name: 上传备份
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ steps.time.outputs.timestamp }}
          path: |
            *.sql
            *.zip
          retention-days: 90
