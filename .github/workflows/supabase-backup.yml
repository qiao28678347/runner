name: Supabase 全量备份（数据库 + 在线 Edge Functions）
on:
  workflow_dispatch:  # 手动点击备份
  schedule:
    - cron: "0 20 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    container: postgres:17-alpine

    steps:
      - uses: actions/checkout@v4

      # 安装依赖
      - name: 安装依赖
        run: |
          apk add --no-cache zip curl nodejs npm

      # 安装 Supabase CLI
      - name: 安装 Supabase CLI
        run: npm install -g supabase

      # 生成时间戳
      - name: 生成时间戳
        id: time
        run: echo "timestamp=$(date +%Y-%m-%d_%H-%M-%S)" >> $GITHUB_OUTPUT

      # ===============================
      # 1. 备份数据库（完整）
      # ===============================
      - name: 备份数据库
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          pg_dump \
            --no-owner \
            --no-privileges \
            --blobs \
            --encoding=utf8 \
            --if-exists \
            --clean \
            "$DATABASE_URL" > db_${{ steps.time.outputs.timestamp }}.sql

      # ===============================
      # 2. 拉取 在线 Edge Functions（真正备份云端函数）
      # ===============================
      - name: 备份在线 Edge Functions
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          mkdir -p functions
          supabase functions pull --project-ref "$SUPABASE_PROJECT_ID"

      # 打包云端函数
      - name: 打包函数
        run: zip -r functions_${{ steps.time.outputs.timestamp }}.zip ./functions

      # ===============================
      # 3. 上传所有备份
      # ===============================
      - name: 上传备份文件
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ steps.time.outputs.timestamp }}
          path: |
            *.sql
            *.zip
          retention-days: 90
