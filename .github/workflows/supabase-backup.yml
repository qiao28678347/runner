name: Supabase Full Backup

on:
  schedule:
    # 每天 UTC 时间 00:00 运行（北京时间早上 8:00）
    # 更多时间: https://crontab.guru/
    - cron: '0 0 * * *'
  workflow_dispatch:   # 支持手动触发

jobs:
  full-backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 只用于自动 commit（可选）

    steps:
      - name: 🛒 Checkout repository
        uses: actions/checkout@v4

      # ---------- 安装依赖 ----------
      - name: 🔧 Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🔧 Install PostgreSQL client (pg_dump) on Ubuntu
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16

      - name: 🔐 Login to Supabase (for Edge Functions)
        run: supabase login --token ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ---------- 1. 备份数据库 ----------
      - name: 💾 Create backup directory
        run: mkdir -p backup

      - name: 📦 Backup database roles
        run: supabase db dump --db-url "${{ secrets.SUPABASE_DB_URL }}" -f backup/roles.sql --role-only

      - name: 📦 Backup database schema
        run: supabase db dump --db-url "${{ secrets.SUPABASE_DB_URL }}" -f backup/schema.sql

      - name: 📦 Backup database data
        run: supabase db dump --db-url "${{ secrets.SUPABASE_DB_URL }}" -f backup/data.sql --data-only --use-copy

      # ---------- 2. 备份 Edge Functions ----------
      - name: 📋 List Edge Functions
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase functions list --project-ref $PROJECT_REF | tee backup/functions_list.txt

      - name: 📦 Download all Edge Functions
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          mkdir -p backup/functions
          FUNCTIONS=$(supabase functions list --project-ref $PROJECT_REF --output json | jq -r '.[].name')
          
          if [ -z "$FUNCTIONS" ]; then
            echo "No Edge Functions found."
          else
            for func in $FUNCTIONS; do
              echo "Downloading function: $func"
              supabase functions download $func --project-ref $PROJECT_REF
            done
            # 移动所有下载的函数到备份文件夹
            if [ -d "supabase/functions" ]; then
              cp -r supabase/functions/* backup/functions/
            fi
          fi

      - name: 📋 Generate functions manifest
        run: |
          echo "# Edge Functions Backup Manifest" > backup/functions/README.md
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> backup/functions/README.md
          echo "" >> backup/functions/README.md
          echo "## Functions List" >> backup/functions/README.md
          cat backup/functions_list.txt >> backup/functions/README.md

      # ---------- 3. 打包所有备份 ----------
      - name: 🗜️ Create timestamped archive
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          tar -czf "supabase_backup_${TIMESTAMP}.tar.gz" backup/
          echo "BACKUP_FILE=supabase_backup_${TIMESTAMP}.tar.gz" >> $GITHUB_ENV
          echo "BACKUP_TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV

      # ---------- 4. 上传到 GitHub Artifacts ----------
      - name: 💾 Upload backup to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.BACKUP_TIMESTAMP }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30

      # ---------- 5. 可选：自动 commit 到仓库 ----------
      - name: 📝 Commit backup files to repo
        if: false   # 默认不启用，如需启用请删除此行（注意：切勿备份到公开仓库！）
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Supabase full backup - ${{ env.BACKUP_TIMESTAMP }}"
          file_pattern: backup/ supabase_backup_*.tar.gz
          commit_user_name: Supabase Backup Bot
          commit_user_email: backup@example.com
