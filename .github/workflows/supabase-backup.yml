name: Supabase Full Backup (Single File)

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 00:00
  workflow_dispatch:

jobs:
  full-backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 仅当需要自动 commit 时使用（默认关闭）

    steps:
      - name: 🛒 Checkout repository
        uses: actions/checkout@v4

      # ---------- 安装依赖 ----------
      - name: 🔧 Install PostgreSQL client (pg_dump & psql)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16 jq

      - name: 🔧 Install Supabase CLI (for Edge Functions)
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ---------- 1. 数据库备份（单文件） ----------
      - name: 💾 Create backup directory
        run: mkdir -p backup

      - name: 📦 Export full database to a single SQL file
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # pg_dump 参数说明：
          # --clean          : 在创建对象前添加 DROP 语句（便于恢复时覆盖）
          # --if-exists      : 使用 IF EXISTS 避免删除不存在的对象报错
          # --no-owner       : 不输出 OWNER 语句（避免恢复时权限问题）
          # --no-privileges  : 不输出权限授予语句（可选，根据需要保留）
          # --role=postgres  : 设置角色（可选）
          # --format=plain   : 纯文本 SQL（配合 -f 输出到文件）
          # -f               : 输出文件
          pg_dump "$DATABASE_URL" \
            --clean \
            --if-exists \
            --no-owner \
            --no-privileges \
            --format=plain \
            -f backup/full_backup.sql
          
          # 可选：压缩备份（如果想节省空间，可在此步 tar 打包时一同压缩）
          echo "✅ Full database backup saved to backup/full_backup.sql"

      # ---------- 2. 备份 Edge Functions (Management API) ----------
      - name: 📋 Fetch and download all Edge Functions
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          mkdir -p backup/functions_raw backup/functions
          API_URL="https://api.supabase.com/v1/projects/${PROJECT_REF}/functions"

          echo "📡 Fetching functions list from ${API_URL}"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET "$API_URL" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ API request failed with status $HTTP_STATUS"
            echo "Response: $BODY"
            exit 1
          fi

          # 提取函数名数组
          FUNCTIONS=$(echo "$BODY" | jq -r 'if type=="array" then .[].name else empty end')

          if [ -z "$FUNCTIONS" ]; then
            echo "⚠️ No Edge Functions found."
            exit 0
          fi

          echo "✅ Found functions: $FUNCTIONS"

          for func in $FUNCTIONS; do
            echo "⬇️ Downloading function: $func"
            curl -s -X GET "$API_URL/${func}/body" \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -o "backup/functions_raw/${func}.zip"

            if [ -s "backup/functions_raw/${func}.zip" ]; then
              mkdir -p "backup/functions/${func}"
              unzip -q "backup/functions_raw/${func}.zip" -d "backup/functions/${func}/"
              echo "  ✅ Extracted to: backup/functions/${func}/"
            else
              echo "  ❌ Failed to download ${func}"
            fi
          done

          # 生成说明文件
          cat > backup/functions/README.md <<EOF
              # Edge Functions Backup
              Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
              
              Functions list:
              $FUNCTIONS
              
              Each directory contains full source code.
              EOF

      # ---------- 3. 打包所有备份 ----------
      - name: 🗜️ Create timestamped archive
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          tar -czf "supabase_backup_${TIMESTAMP}.tar.gz" backup/
          echo "BACKUP_FILE=supabase_backup_${TIMESTAMP}.tar.gz" >> $GITHUB_ENV
          echo "BACKUP_TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV

      # ---------- 4. 上传到 GitHub Artifacts ----------
      - name: 💾 Upload backup to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.BACKUP_TIMESTAMP }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 30

      # ---------- 5. （可选）自动 commit 到私有仓库 ----------
      # 警告：仅限私有仓库！不要提交公开仓库。
      # - name: Commit backup files
      #   uses: stefanzweifel/git-auto-commit-action@v5
      #   with:
      #     commit_message: "Supabase full backup - ${{ env.BACKUP_TIMESTAMP }}"
      #     file_pattern: backup/ supabase_backup_*.tar.gz
