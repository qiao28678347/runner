name: Supabase Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 jq

      - name: Backup database
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backup
          pg_dump "$DATABASE_URL" --clean --if-exists --no-owner --no-privileges --format=plain -f backup/db.sql

      - name: Backup Edge Functions
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          mkdir -p backup/functions
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/functions"
          curl -s -H "Authorization: Bearer ${TOKEN}" "$API" | jq -r '.[].name' | while read func; do
            curl -s -H "Authorization: Bearer ${TOKEN}" "$API/${func}/body" -o "backup/functions/${func}.zip"
          done

      - name: Create archive
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          tar -czf "supabase_backup_${TIMESTAMP}.tar.gz" backup/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.TIMESTAMP }}
          path: supabase_backup_*.tar.gz
          retention-days: 30
