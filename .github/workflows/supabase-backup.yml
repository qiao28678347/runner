# ==============================================
# Supabase 全量自动备份（终极版）
# 解决 pg_dump 版本冲突 ✅ 支持 PostgreSQL 17
# 手动点击备份 + 每日自动备份
# ==============================================
name: Supabase 全量自动备份

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:  # 手动点击备份

jobs:
  backup:
    runs-on: ubuntu-latest
    container: postgres:17-alpine  # 🔥 强制使用 PG17 客户端，彻底解决版本问题

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖 zip
        run: apk add --no-cache zip

      - name: 生成时间戳
        id: time
        run: echo "timestamp=$(date +%Y-%m-%d_%H-%M-%S)" >> $GITHUB_OUTPUT

      # ==============================================
      # 数据库全量备份（数据+函数+触发器+视图+约束）
      # ==============================================
      - name: 备份数据库
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          pg_dump \
            --no-owner \
            --no-privileges \
            --blobs \
            --encoding=utf8 \
            --if-exists \
            --clean \
            "$DATABASE_URL" > supabase_db_full_${{ steps.time.outputs.timestamp }}.sql

      # ==============================================
      # 备份云函数
      # ==============================================
      - name: 打包云函数
        run: |
          if [ -d "./functions" ]; then
            zip -r supabase_functions_${{ steps.time.outputs.timestamp }}.zip ./functions
          else
            touch supabase_functions_${{ steps.time.outputs.timestamp }}.zip
          fi

      # ==============================================
      # 上传备份文件
      # ==============================================
      - name: 上传备份
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ steps.time.outputs.timestamp }}
          path: |
            *.sql
            *.zip
          retention-days: 90
