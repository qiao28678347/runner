name: Supabase Official Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Backup database (official CLI)
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backup
          supabase db dump --db-url "$DB_URL" -f backup/roles.sql --role-only
          supabase db dump --db-url "$DB_URL" -f backup/schema.sql
          supabase db dump --db-url "$DB_URL" -f backup/data.sql --data-only --use-copy

      - name: Backup Edge Functions (official API)
        env:
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          mkdir -p backup/functions
          API="https://api.supabase.com/v1/projects/${PROJECT_REF}/functions"
          curl -s -H "Authorization: Bearer ${TOKEN}" "$API" | jq -r '.[].name' | while read func; do
            curl -s -H "Authorization: Bearer ${TOKEN}" "$API/${func}/body" -o "backup/functions/${func}.zip"
          done

      - name: Archive and upload
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          tar -czf "supabase_backup_${TIMESTAMP}.tar.gz" backup/
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.TIMESTAMP }}
          path: supabase_backup_*.tar.gz
          retention-days: 30
